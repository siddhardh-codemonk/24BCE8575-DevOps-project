<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TechSymphony 2026</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav>
    <div class="logo">TECHSYMPHONY '26</div>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="schedule.html">Schedule</a></li>
        <li><a href="speakers.html">Speakers</a></li>
        <li><a href="announcement.html">Announcements</a></li>
        <li><a href="register.html">Register</a></li>
    </ul>
</nav>
<div class="section">
    <h2>Register Now</h2>
    <div class="form-wrap">
        <div class="card">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>College Name</label>
                <input type="text" placeholder="Enter your college name">
            </div>
            <div class="form-group">
                <label>Register Number</label>
                <input type="text" placeholder="Enter your register number">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" placeholder="Enter your phone number">
            </div>
            <div class="form-group">
                <label for="eventSelect">Select Event</label>
                <select id="eventSelect" title="Select an event">
                    <option>Select an event</option>
                    <option>Code Storm</option>
                    <option>Hackathon</option>
                    <option>Paper Presentation</option>
                    <option>Project Expo</option>
                    <option>Quiz Competition</option>
                    <option>DevOps Workshop</option>
                    <option>Cybersecurity Workshop</option>
                    <option>ML/AI Workshop</option>
                </select>
            </div>
            <div class="form-group">
                <label>Department & Year</label>
                <input type="text" placeholder="e.g. CSE - 3rd Year">
            </div>
            <div class="form-actions">
                <a href="index.html" class="btn btn-primary">Submit Registration</a>
            </div>
        </div>
    </div>
</div>
<footer>
    <p>TechSymphony 2026 &copy; <span>Miyamoto University</span> | Department of CSE</p>
</footer>
</body>
</html>
