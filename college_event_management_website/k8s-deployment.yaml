apiVersion: apps/v1
kind: Deployment
metadata:
  name: college-event-deployment
  labels:
    app: college-event-website
spec:
  replicas: 2
  selector:
    matchLabels:
      app: college-event-website
  template:
    metadata:
      labels:
        app: college-event-website
    spec:
      containers:
      - name: college-event-website
        image: college-event-website:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: college-event-service
spec:
  type: NodePort
  selector:
    app: college-event-website
  ports:
  - protocol: TCP
    port: 8081
    targetPort: 8081
    nodePort: 30081